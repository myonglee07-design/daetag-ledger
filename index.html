    '<div style="flex:1;"><div class="form-label">팁</div><input class="form-input form-input-mono" type="number" id="f_tip" placeholder="0" value="' + (tip||'') + '" style="width:100%;" oninput="updateCalc()"></div>' +
    '</div>' +
    '<div class="form-group"><div class="form-label">교통비</div>' +
    '<div id="transport_list">';
  transports.forEach(function(t, i) { html += transportItemHTML(t, i); });
  html +=
    '</div>' +
    '<button type="button" onclick="addTransport()" style="width:100%;padding:8px;background:var(--bg-input);border:1px dashed var(--border);border-radius:8px;color:var(--text-muted);font-size:12px;cursor:pointer;margin-bottom:8px;">+ 교통비 추가</button></div>' +
    '</div></div>' +
    '<div class="form-group"><div class="form-label">특이사항</div><input class="form-input" id="f_remark" placeholder="즉후, 후불, 연락처 등" value="' + remark + '"></div>';

  html += '<div class="calc-box" id="calcBox"></div>';

  if (isEdit) {
    html += '<div style="margin-top:12px;"><button class="btn-danger" style="width:100%" onclick="deleteOrder(' + orderId + ')">이 오더 삭제</button></div>';
  }

  document.getElementById('orderFormBody').innerHTML = html;

  if (pid==='kakao') {
    const affChk = document.getElementById('f_affiliate');
    if (affChk) {
      affChk.addEventListener('change', function() {
        const exemptRow = document.getElementById('f_exempt');
        updateCalc();
      });
    }
  }

  updateCalc();
  openSheet('orderSheet');

  setTimeout(function() {
    bindAddrInput(document.getElementById('f_start'));
    bindAddrInput(document.getElementById('f_end'));
    document.querySelectorAll('.visit-row').forEach(function(el) { bindAddrInput(el); });
  }, 100);
}

function transportItemHTML(t, i) {
  return '<div id="tr_' + i + '" style="display:flex;gap:6px;align-items:center;margin-bottom:6px;">' +
    '<select id="tr_type_' + i + '" style="flex:1;background:var(--bg-input);border:1px solid var(--border);border-radius:8px;padding:8px;color:var(--text-primary);font-size:13px;">' +
    '<option ' + (t.type==='버스'?'selected':'') + '>버스</option>' +
    '<option ' + (t.type==='지하철'?'selected':'') + '>지하철</option>' +
    '<option ' + (t.type==='택시'?'selected':'') + '>택시</option>' +
    '<option ' + (t.type==='기타'?'selected':'') + '>기타</option>' +
    '</select>' +
    '<input id="tr_amt_' + i + '" type="number" class="form-input form-input-mono" style="width:90px;flex-shrink:0;" placeholder="0" value="' + (t.amount||'') + '" oninput="updateCalc()">' +
    '<button type="button" onclick="removeTransport(' + i + ')" style="width:28px;height:36px;background:var(--expense-dim);color:var(--expense);border:none;border-radius:6px;font-size:16px;cursor:pointer;flex-shrink:0;">×</button>' +
    '</div>';
}

let transportCount = 0;
function addTransport() {
  transportCount++;
  const list = document.getElementById('transport_list');
  const div = document.createElement('div');
  div.innerHTML = transportItemHTML({type:'버스',amount:0}, transportCount);
  list.appendChild(div.firstChild);
  updateCalc();
}
function removeTransport(i) {
  const el = document.getElementById('tr_'+i);
  if (el) { el.remove(); updateCalc(); }
}
function toggleTmapExtra() {
  const chk = document.getElementById('f_affiliate');
  const row = document.getElementById('tmap_extra_row');
  if (row) row.style.display = chk.checked ? 'block' : 'none';
  updateCalc();
}
function toggleTollPassenger(cb) {
  const f = document.getElementById('f_toll');
  if (!f) return;
  f.disabled = cb.checked;
  if (cb.checked) f.value = '';
  updateCalc();
}
function addVisitRow() {
  const list = document.getElementById('visitList');
  if (!list) return;
  const idx = list.querySelectorAll('.visit-row').length;
  const div = document.createElement('div');
  div.style.cssText = 'display:flex;gap:6px;align-items:center;';
  div.innerHTML = '<input class="form-input visit-row" style="flex:1" placeholder="경유지 ' + (idx+1) + '"><button type="button" onclick="removeVisitRow(this)" style="width:28px;height:36px;background:var(--expense-dim);color:var(--expense);border:none;border-radius:6px;font-size:16px;cursor:pointer;flex-shrink:0;">×</button>';
  list.appendChild(div);
  bindAddrInput(div.querySelector('.visit-row'));
}
function removeVisitRow(btn) {
  const row = btn.closest('div[style]');
  if (row) row.remove();
}
function getFormVisitAddrs() {
  return Array.from(document.querySelectorAll('.visit-row')).map(el=>el.value.trim()).filter(Boolean);
}
function onFareInput() {
  const p = PLATFORMS[selectedPlatform || (editingOrderId ? (orders.find(x=>x.id===editingOrderId)||{}).platform : null)];
  if (!p) return;
  const fare = parseInt(document.getElementById('f_fare').value||0)||0;
  const feeEl = document.getElementById('f_fee_override');
  if (feeEl) feeEl.value = Math.round(fare * p.feeRate);
  updateCalc();
}
function getFormTransports() {
  const list = document.getElementById('transport_list');
  if (!list) return [];
  const result = [];
  list.querySelectorAll('[id^="tr_type_"]').forEach(function(sel) {
    const i = sel.id.replace('tr_type_','');
    const amtEl = document.getElementById('tr_amt_'+i);
    const amt = amtEl ? (parseInt(amtEl.value)||0) : 0;
    if (amt > 0) result.push({ type: sel.value, amount: amt });
  });
  return result;
}
function updateCalc() {
  const pid = selectedPlatform || (editingOrderId ? (orders.find(x=>x.id===editingOrderId)||{}).platform : null);
  const p = PLATFORMS[pid];
  if (!p) return;
  const fare = parseInt((document.getElementById('f_fare')||{}).value||0)||0;
  const extraRoute = parseInt((document.getElementById('f_extraRoute')||{}).value||0)||0;
  const tip = parseInt((document.getElementById('f_tip')||{}).value||0)||0;
  const toll = parseInt((document.getElementById('f_toll')||{}).value||0)||0;
  const isAffiliate = (document.getElementById('f_affiliate')||{}).checked||false;
  const affiliateExempt = (document.getElementById('f_exempt')||{}).checked||false;
  const tmapExtra = parseInt((document.getElementById('f_tmap_extra')||{}).value||0)||0;
  const transports = getFormTransports();
  const transTotal = transports.reduce((s,t)=>s+t.amount,0);

  const income = fare + extraRoute + tip;
  const autoFee = Math.round(fare * p.feeRate);
  const feeOverrideEl = document.getElementById('f_fee_override');
  const fee = feeOverrideEl ? (parseInt(feeOverrideEl.value||0)||0) : autoFee;
  const feeLabel = fee !== autoFee ? '수수료 (직접입력)' : '수수료 (' + (p.feeRate*100) + '%)';
  let insuranceFee = 0, affiliateFee = 0;
  if (p.id==='daegu') insuranceFee = 800;
  if (p.id==='kakao' && isAffiliate && !affiliateExempt) affiliateFee = 800;
  const expense = fee + insuranceFee + affiliateFee + (p.id==='tmap'&&isAffiliate?tmapExtra:0) + toll + transTotal;
  const net = income - expense;

  const box = document.getElementById('calcBox');
  if (!box) return;
  let rows = '<div class="calc-row"><span>수입</span><span class="calc-val income-color">' + fmt(income) + '</span></div>';
  rows += '<div class="calc-row"><span>' + feeLabel + '</span><span class="calc-val expense-color">-' + fmt(fee) + '</span></div>';
  if (insuranceFee) rows += '<div class="calc-row"><span>건당 보험</span><span class="calc-val expense-color">-' + fmt(insuranceFee) + '</span></div>';
  if (affiliateFee) rows += '<div class="calc-row"><span>제휴콜 수수료</span><span class="calc-val expense-color">-' + fmt(affiliateFee) + '</span></div>';
  if (toll) rows += '<div class="calc-row"><span>통행료</span><span class="calc-val expense-color">-' + fmt(toll) + '</span></div>';
  if (transTotal) rows += '<div class="calc-row"><span>교통비</span><span class="calc-val expense-color">-' + fmt(transTotal) + '</span></div>';
  rows += '<div class="calc-row total"><span>실수입</span><span class="calc-val ' + (net>=0?'income-color':'expense-color') + '">' + fmtSign(net) + '</span></div>';
  box.innerHTML = rows;
}

// ===================== 오더 저장/삭제 =====================
async function submitOrder() {
  const pid = selectedPlatform || (editingOrderId ? (orders.find(x=>x.id===editingOrderId)||{}).platform : null);
  const p = PLATFORMS[pid];
  if (!p) return;
  const dtVal = (document.getElementById('f_datetime')||{}).value;
  if (!dtVal) { showToast('날짜/시간을 입력해주세요'); return; }
  const datetime = dtVal.replace('T',' ');
  const date = datetime.split(' ')[0];
  const fare = parseInt((document.getElementById('f_fare')||{}).value||0)||0;
  const isAffiliate = (document.getElementById('f_affiliate')||{}).checked||false;
  const affiliateExempt = document.getElementById('f_exempt') ? document.getElementById('f_exempt').checked : (p.affiliateExempt||false);
  const tmapExtraFee = parseInt((document.getElementById('f_tmap_extra')||{}).value||0)||0;
  const affiliateFee = (pid==='kakao'&&isAffiliate&&!affiliateExempt) ? 800 : 0;
  const perCallInsurance = pid==='daegu' ? 800 : 0;
  const toll = parseInt((document.getElementById('f_toll')||{}).value||0)||0;
  const autoFee = Math.round(fare * p.feeRate);
  const feeOverrideVal = parseInt((document.getElementById('f_fee_override')||{}).value||0)||0;
  const feeOverride = feeOverrideVal !== autoFee ? feeOverrideVal : null;

  const obj = {
    platform: pid,
    datetime, date,
    startAddr: (document.getElementById('f_start')||{}).value||'',
    endAddr: (document.getElementById('f_end')||{}).value||'',
    visitAddrs: getFormVisitAddrs(),
    fare,
    feeOverride,
    extraRoute: parseInt((document.getElementById('f_extraRoute')||{}).value||0)||0,
    tip: parseInt((document.getElementById('f_tip')||{}).value||0)||0,
    isAffiliate, affiliateExempt, affiliateFee,
    tmapExtraFee: pid==='tmap'&&isAffiliate ? tmapExtraFee : 0,
    perCallInsurance,
    toll,
    transports: getFormTransports(),
    remark: (document.getElementById('f_remark')||{}).value||'',
  };

  if (editingOrderId) {
    obj.id = editingOrderId;
    await dbPut('orders', obj);
    const idx = orders.findIndex(x=>x.id===editingOrderId);
    if (idx>=0) orders[idx] = obj;
    showToast('수정되었습니다');
  } else {
    const id = await dbPut('orders', obj);
    obj.id = id;
    orders.push(obj);
    showToast('오더가 추가되었습니다');
  }

  if (obj.startAddr) await saveAddrHistory(obj.startAddr);
  if (obj.endAddr) await saveAddrHistory(obj.endAddr);
  for (const v of (obj.visitAddrs||[])) await saveAddrHistory(v);
  closeSheet();
  render();
}
async function deleteOrder(id) {
  if (!confirm('이 오더를 삭제할까요?')) return;
  await dbDelete('orders', id);
  orders = orders.filter(x=>x.id!==id);
  closeSheet();
  showToast('삭제되었습니다');
  render();
}
function editOrder(id) {
  const o = orders.find(x=>x.id===id);
  if (!o) return;
  selectedPlatform = o.platform;
  openOrderForm(o.platform, id);
}

// ===================== 바텀시트 =====================
function openSheet(id) {
  document.getElementById('overlay').classList.add('show');
  document.getElementById(id).classList.add('show');
}
function closeSheet() {
  document.getElementById('overlay').classList.remove('show');
  document.querySelectorAll('.bottom-sheet').forEach(function(s) { s.classList.remove('show'); });
}

// ===================== 고정 지출 =====================
function openFixedSheet() {
  const body = document.getElementById('fixedSheetBody');
  let html = '';
  settings.fixedExpenses.forEach(function(f, i) {
    html +=
      '<div style="background:var(--bg-input);border:1px solid var(--border);border-radius:10px;padding:12px 14px;margin-bottom:8px;">' +
      '<div style="display:flex;align-items:center;justify-content:space-between;gap:8px;">' +
      '<label class="toggle"><input type="checkbox" id="fixed_active_' + i + '" ' + (f.active?'checked':'') + ' onchange="updateFixedActive(' + i + ',this.checked)"><div class="toggle-track"></div><div class="toggle-thumb"></div></label>' +
      '<div style="flex:1;margin-left:8px;font-size:13px;color:var(--text-primary);">' + f.name + '</div>' +
      (f.locked ?
        '<span style="font-size:13px;color:var(--expense);font-family:JetBrains Mono,monospace;">' + fmt(f.amount) + '</span>' +
        '<button class="btn-icon" onclick="unlockFixed(' + i + ')" title="잠금 해제">🔒</button>'
        :
        '<input type="number" id="fixed_amt_' + i + '" value="' + f.amount + '" onchange="updateFixedAmount(' + i + ',this.value)" class="form-input form-input-mono" style="width:90px;">' +
        '<button class="btn-icon" onclick="lockFixed(' + i + ')">🔓</button>'
      ) +
      '</div></div>';
  });
  body.innerHTML = html;
  openSheet('fixedSheet');
}
function updateFixedActive(i, v) { settings.fixedExpenses[i].active = v; }
function updateFixedAmount(i, v) { settings.fixedExpenses[i].amount = parseInt(v)||0; }
function unlockFixed(i) { settings.fixedExpenses[i].locked = false; openFixedSheet(); }
function lockFixed(i) { settings.fixedExpenses[i].locked = true; openFixedSheet(); }
async function saveFixedExpenses() { await saveSettings(); closeSheet(); showToast('저장되었습니다'); render(); }

// ===================== 백업/복원 =====================
async function backupToFile() {
  try {
    const data = { version:'1.0', exportDate: new Date().toISOString(), orders, settings };
    const json = JSON.stringify(data);
    const zip = new JSZip();
    const fname = 'driver_ledger_' + dateStr(new Date()) + '.json';
    zip.file(fname, json);
    const blob = await zip.generateAsync({type:'blob'});
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url; a.download = 'driver_ledger_' + dateStr(new Date()) + '.zip';
    a.click(); URL.revokeObjectURL(url);
    showToast('백업 파일이 저장되었습니다');
  } catch(e) { showToast('백업 실패: '+e.message); }
}
async function restoreFromFile(input) {
  try {
    const file = input.files[0];
    if (!file) return;
    const zip = await JSZip.loadAsync(file);
    const jsonFile = Object.values(zip.files).find(f=>f.name.endsWith('.json'));
    if (!jsonFile) { showToast('유효한 백업 파일이 아닙니다'); return; }
    const text = await jsonFile.async('text');
    const data = JSON.parse(text);
    if (!confirm('백업 날짜: ' + data.exportDate + '\n복원하면 현재 데이터가 덮어씌워집니다. 계속할까요?')) return;
    const tx = db.transaction('orders','readwrite');
    tx.objectStore('orders').clear();
    await new Promise(function(r) { tx.oncomplete=r; });
    for (const o of (data.orders||[])) { await dbPut('orders', o); }
    orders = data.orders||[];
    if (data.settings) settings = data.settings;
    await saveSettings();
    showToast('복원 완료!');
    render();
  } catch(e) { showToast('복원 실패: '+e.message); }
}
async function importLegacyDB(input) {
  try {
    const file = input.files[0];
    if (!file) return;
    let dbBuffer;
    if (file.name.endsWith('.zip')) {
      const zip = await JSZip.loadAsync(file);
      const dbFile = Object.values(zip.files).find(f=>f.name.endsWith('.db'));
      if (!dbFile) { showToast('.db 파일을 찾을 수 없습니다'); return; }
      dbBuffer = await dbFile.async('arraybuffer');
    } else {
      dbBuffer = await file.arrayBuffer();
    }
    showToast('DB 파일 감지됨 — 변환 중...', 3000);
    await loadSqlJs(dbBuffer);
  } catch(e) { showToast('가져오기 실패: '+e.message); }
}
async function loadSqlJs(dbBuffer) {
  if (!window.initSqlJs) {
    await new Promise(function(res, rej) {
      const s = document.createElement('script');
      s.src = 'https://cdnjs.cloudflare.com/ajax/libs/sql.js/1.10.2/sql-wasm.js';
      s.onload = res; s.onerror = rej;
      document.head.appendChild(s);
    });
  }
  const SQL = await window.initSqlJs({ locateFile: function(f) { return 'https://cdnjs.cloudflare.com/ajax/libs/sql.js/1.10.2/'+f; } });
  const legacyDb = new SQL.Database(new Uint8Array(dbBuffer));
  const calls = legacyDb.exec("SELECT _id, CALL_WORK_DATE, CALL_APP, CALL_ORDER_DATETIME, CALL_START, CALL_END, CALL_VISIT, CALL_REMARK FROM T_CALL")[0];
  const cash = legacyDb.exec("SELECT CALL_ID, ITEM_ID, CASH_MONEY FROM T_CASH")[0];
  if (!calls) { showToast('콜 데이터가 없습니다'); return; }
  const cashMap = {};
  if (cash) {
    for (const row of cash.values) {
      const callId=row[0], itemId=row[1], money=row[2];
      if (!cashMap[callId]) cashMap[callId] = {};
      cashMap[callId][itemId] = (cashMap[callId][itemId]||0) + (money||0);
    }
  }
  const platformMap = {'카카오':'kakao','카카오드라이버':'kakao','티맵':'tmap','티맵드라이버':'tmap','대구시민':'daegu','수퍼드라이버':'super','로지1':'logi1','로지2':'logi2','아이콘':'icon','콜마너':'icon','기타':'kakao'};
  const converted = [];
  for (const row of calls.values) {
    const id=row[0], workDate=row[1], app=row[2], orderDt=row[3], start=row[4], end=row[5], visit=row[6], remark=row[7];
    const c = cashMap[id]||{};
    const fare=c[1]||0, extraRoute=c[2]||0, tip=c[3]||0;
    const feeRaw=Math.abs(c[4]||0), transRaw=Math.abs(c[5]||0);
    const pid = platformMap[app]||'kakao';
    const p = PLATFORMS[pid];
    const computedFare = feeRaw>0 ? Math.round(feeRaw/p.feeRate) : fare;
    const dt = orderDt||workDate+' 00:00';
    converted.push({
      platform:pid, datetime:dt, date:dt.split(' ')[0],
      startAddr:start||'', endAddr:end||'',
      visitAddrs: visit ? [visit] : [],
      fare:computedFare, extraRoute, tip, feeOverride:null,
      isAffiliate:false, affiliateExempt:false, affiliateFee:0,
      tmapExtraFee:0, perCallInsurance:0, toll:0,
      transports: transRaw>0?[{type:'기타',amount:transRaw}]:[],
      remark: remark||'',
    });
  }
  if (!confirm(converted.length + '건의 콜 데이터를 가져옵니다.\n기존 데이터에 추가됩니다. 계속할까요?')) return;
  for (const o of converted) { const id = await dbPut('orders',o); o.id=id; orders.push(o); }
  showToast(converted.length + '건 가져오기 완료!', 3000);
  render();
}
