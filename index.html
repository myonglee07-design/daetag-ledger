<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="HandheldFriendly" content="true">
<meta name="theme-color" content="#0d1117">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>лҢҖнғҒ к°Җкі„л¶Җ</title>
<link rel="manifest" href="manifest.json">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;600;700&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
<style>
:root {
  --bg-primary: #0a0e1a;
  --bg-secondary: #0f1628;
  --bg-card: #141e35;
  --bg-input: #1a2540;
  --border: #243050;
  --border-active: #d4a853;
  --text-primary: #f0e6c8;
  --text-secondary: #9a8a6a;
  --text-muted: #5a4e38;
  --accent: #d4a853;
  --accent-dim: rgba(212,168,83,0.15);
  --accent-hover: #e8c06a;
  --income: #94a3b8;
  --expense: #ef4444;
  --income-dim: rgba(148,163,184,0.10);
  --expense-dim: rgba(239,68,68,0.12);
  --kakao: #FEE500;
  --tmap: #0064FF;
  --daegu: #a855f7;
  --super: #ec4899;
  --logi: #14b8a6;
  --icon: #22c55e;
  --icon2: #f97316;
  --radius: 12px;
  --radius-sm: 8px;
}

/* нҷ”мқҙнҠё н…Ңл§Ҳ */
[data-theme="white"] {
  --bg-primary: #f4f6f9;
  --bg-secondary: #e8ecf2;
  --bg-card: #ffffff;
  --bg-input: #eef0f5;
  --border: #d0d6e0;
  --border-active: #e67e00;
  --text-primary: #111827;
  --text-secondary: #374151;
  --text-muted: #6b7280;
  --accent: #e67e00;
  --accent-dim: rgba(230,126,0,0.12);
  --accent-hover: #c96e00;
  --income: #0ea5e9;
  --expense: #dc2626;
  --income-dim: rgba(14,165,233,0.10);
  --expense-dim: rgba(220,38,38,0.12);
}
* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
html { -webkit-text-size-adjust: 100%; text-size-adjust: 100%; font-size: clamp(14px, 3.8vw, 17px); }
html, body { height: 100%; background: var(--bg-primary); color: var(--text-primary); font-family: 'Noto Sans KR',sans-serif; overflow: hidden; }
#app { height: 100%; display: flex; flex-direction: column; max-width: 480px; margin: 0 auto; position: relative; }

/* мғҒлӢЁ н—ӨлҚ” */
.header {
  background: var(--bg-secondary);
  border-bottom: 1px solid var(--border);
  padding: calc(14px + env(safe-area-inset-top)) 16px 10px;
  display: flex; align-items: center; justify-content: space-between;
  position: relative; z-index: 10;
  flex-shrink: 0;
}
.header-title { font-size: clamp(15px, 4.2vw, 17px); font-weight: 700; color: var(--text-primary); text-align:center; font-family: 'Noto Sans KR',sans-serif; }
.header-subtitle { font-size: clamp(10px, 2.8vw, 11px); color: var(--text-secondary); margin-top: 1px; text-align:center; }
.header-center {
  position: absolute;
  left: 50%;
  transform: translateX(-50%);
  text-align: center;
  pointer-events: none;
  white-space: nowrap;
}

/* мҠӨнҒ¬лЎӨ мҳҒм—ӯ */
.content { flex: 1 1 0; min-height: 0; overflow-y: auto; overflow-x: hidden; padding-bottom: 70px; touch-action: pan-y; }
.content::-webkit-scrollbar { display: none; }

/* н•ҳлӢЁ кі м • мӢӨмҲҳмһ… л°” */
#parentBar {
  position: fixed;
  bottom: 0;
  left: 50%; transform: translateX(-50%);
  width: 100%; max-width: 480px;
  background: var(--bg-secondary);
  z-index: 99;
  padding-bottom: env(safe-area-inset-bottom);
}

/* FAB */
.fab { position: fixed; bottom: calc(76px + env(safe-area-inset-bottom)); right: calc(50% - 228px); width: 52px; height: 52px; background: var(--accent); border-radius: 50%; display: flex; align-items: center; justify-content: center; border: none; cursor: pointer; box-shadow: 0 4px 20px rgba(249,115,22,0.4); z-index: 50; }
.fab:active { transform: scale(0.93); }
@media (max-width: 480px) { .fab { right: 16px; } }

/* м№ҙл“ң */
.card { background: var(--bg-card); border: 1px solid var(--border); border-radius: var(--radius); padding: 16px; margin: 12px 16px 0; }
.card-sm { background: var(--bg-card); border: 1px solid var(--border); border-radius: var(--radius-sm); padding: 12px; }

/* м„№м…ҳ нғҖмқҙнӢҖ */
.section-label { font-size: clamp(10px, 2.8vw, 11px); font-weight: 600; color: var(--text-secondary); letter-spacing: 0.08em; text-transform: uppercase; margin: 20px 16px 8px; }

/* кёҲм•Ў н‘ңмӢң */
.amount { font-family: 'JetBrains Mono', monospace; }
.amount-lg { font-size: clamp(22px, 6.5vw, 28px); font-weight: 600; }
.amount-md { font-size: clamp(15px, 4.2vw, 18px); font-weight: 600; }
.amount-sm { font-size: clamp(12px, 3.5vw, 14px); font-weight: 500; }
.income-color { color: var(--income); }
.expense-color { color: var(--expense); }
.accent-color { color: var(--accent); }

/* лІ„нҠј */
.btn-primary { background: var(--accent); color: #fff; border: none; border-radius: var(--radius-sm); padding: 14px 20px; font-size: clamp(14px, 3.8vw, 15px); font-weight: 600; cursor: pointer; width: 100%; font-family: 'Noto Sans KR',sans-serif; }
.btn-primary:active { background: var(--accent-hover); transform: scale(0.98); }
.btn-secondary { background: var(--bg-input); color: var(--text-primary); border: 1px solid var(--border); border-radius: var(--radius-sm); padding: 12px 20px; font-size: clamp(13px, 3.5vw, 14px); font-weight: 500; cursor: pointer; width: 100%; font-family: 'Noto Sans KR',sans-serif; }
.btn-secondary:active { background: #333; }
.btn-danger { background: var(--expense-dim); color: var(--expense); border: 1px solid rgba(239,68,68,0.3); border-radius: var(--radius-sm); padding: 10px 16px; font-size: 13px; cursor: pointer; font-family: 'Noto Sans KR',sans-serif; }
.btn-icon { background: none; border: none; cursor: pointer; padding: 6px; border-radius: 6px; color: var(--text-secondary); display:flex; align-items:center; }
.btn-icon:active { background: var(--bg-input); }
.header-btn { background: none; border: 1px solid var(--border); border-radius: 8px; padding: 4px 8px; cursor: pointer; display: flex; align-items: center; gap: 4px; color: var(--text-secondary); white-space: nowrap; }
.header-btn:active { background: var(--bg-input); }
.theme-btn { background: none; border: 1px solid var(--border); border-radius: 8px; width: 34px; height: 34px; cursor: pointer; display: flex !important; align-items: center; justify-content: center; color: var(--text-secondary); flex-shrink: 0; -webkit-appearance: none; appearance: none; }
.theme-btn:active { background: var(--bg-input); }
.theme-btn svg { width: 18px; height: 18px; pointer-events: none; }

/* мһ…л Ҙ нҸј */
.form-group { margin-bottom: 14px; }
.form-label { font-size: clamp(11px, 3vw, 12px); color: var(--text-secondary); margin-bottom: 6px; display: block; font-weight: 500; }
.form-input {
  width: 100%; background: var(--bg-input); border: 1px solid var(--border);
  border-radius: var(--radius-sm); padding: 12px 14px; color: var(--text-primary);
  font-size: clamp(14px, 3.8vw, 16px); font-family: 'Noto Sans KR',sans-serif; outline: none;
}
.form-input:focus { border-color: var(--accent); }
.form-input::placeholder { color: var(--text-muted); }
.form-input-mono { font-family: 'JetBrains Mono', monospace; }
/* мҲ«мһҗ мҠӨн”јл„Ҳ м ңкұ° */
input[type=number]::-webkit-inner-spin-button,
input[type=number]::-webkit-outer-spin-button { -webkit-appearance: none; margin: 0; }
input[type=number] { -moz-appearance: textfield; appearance: textfield; }
.form-row { display: flex; gap: 10px; }
.form-row .form-group { flex: 1; }

/* нҶ кёҖ мҠӨмң„м№ҳ */
.toggle-row { display: flex; align-items: center; justify-content: space-between; padding: 10px 10px; background: var(--bg-input); border-radius: var(--radius-sm); margin-bottom: 10px; }
.toggle-label { font-size: 13px; color: var(--text-primary); }
.toggle-sub { font-size: 11px; color: var(--text-secondary); margin-top: 1px; }
.toggle { position: relative; width: 44px; height: 24px; flex-shrink: 0; }
.toggle input { opacity: 0; width: 0; height: 0; }
.toggle-track { position: absolute; inset: 0; background: var(--border); border-radius: 24px; cursor: pointer; transition: background 0.2s; }
.toggle input:checked + .toggle-track { background: var(--accent); }
.toggle-thumb { position: absolute; width: 18px; height: 18px; background: white; border-radius: 50%; top: 3px; left: 3px; transition: transform 0.2s; pointer-events: none; }
.toggle input:checked ~ .toggle-thumb { transform: translateX(20px); }

/* н”Ңлһ«нҸј к·ёлҰ¬л“ң */
.platform-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; padding: 16px; }
.platform-btn {
  background: var(--bg-card); border: 1.5px solid var(--border); border-radius: var(--radius);
  padding: 16px 12px; cursor: pointer; display: flex; flex-direction: column;
  align-items: flex-start; gap: 6px; transition: all 0.15s; position: relative; overflow: hidden;
}
.platform-btn:active { transform: scale(0.97); }
.platform-btn::before { content: ''; position: absolute; left: 0; top: 0; width: 3px; height: 100%; border-radius: 3px 0 0 3px; }
.platform-btn.kakao::before { background: var(--kakao); }
.platform-btn.tmap::before { background: var(--tmap); }
.platform-btn.daegu::before { background: var(--daegu); }
.platform-btn.super::before { background: var(--super); }
.platform-btn.logi1::before, .platform-btn.logi2::before { background: var(--logi); }
.platform-btn.icon::before { background: var(--icon); }
.platform-btn.icon2::before { background: var(--icon2); }
.platform-name { font-size: 14px; font-weight: 600; color: var(--text-primary); }
.platform-type { font-size: 10px; color: var(--text-secondary); background: var(--bg-input); padding: 2px 6px; border-radius: 4px; }

/* мҳӨлҚ” лӘ©лЎқ м•„мқҙн…ң */
.order-item {
  background: var(--bg-card); border: 1px solid var(--border); border-radius: var(--radius);
  margin: 6px 16px; padding: 14px; cursor: pointer; position: relative; overflow: hidden;
}
.order-item:active { background: #282828; }
.order-item::before { content: ''; position: absolute; left: 0; top: 0; width: 3px; height: 100%; }
.order-item.kakao::before { background: var(--kakao); }
.order-item.tmap::before { background: var(--tmap); }
.order-item.daegu::before { background: var(--daegu); }
.order-item.super::before { background: var(--super); }
.order-item.logi1::before, .order-item.logi2::before { background: var(--logi); }
.order-item.icon::before { background: var(--icon); }
.order-item.icon2::before { background: var(--icon2); }
.order-item.kakao { background: linear-gradient(135deg, rgba(254,229,0,0.08) 0%, var(--bg-card) 60%); }
.order-item.tmap { background: linear-gradient(135deg, rgba(0,100,255,0.10) 0%, var(--bg-card) 60%); }
.order-item.daegu { background: linear-gradient(135deg, rgba(168,85,247,0.10) 0%, var(--bg-card) 60%); }
.order-item.super { background: linear-gradient(135deg, rgba(236,72,153,0.10) 0%, var(--bg-card) 60%); }
.order-item.logi1, .order-item.logi2 { background: linear-gradient(135deg, rgba(20,184,166,0.10) 0%, var(--bg-card) 60%); }
.order-item.icon { background: linear-gradient(135deg, rgba(34,197,94,0.10) 0%, var(--bg-card) 60%); }
.order-item.icon2 { background: linear-gradient(135deg, rgba(249,115,22,0.10) 0%, var(--bg-card) 60%); }
.order-item-header { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 6px; }
.order-type-badge { font-size: 10px; font-weight: 600; }
.order-time { font-size: clamp(13px, 3.5vw, 15px); color: var(--text-secondary); font-family: 'JetBrains Mono', monospace; }
.order-platform { font-size: clamp(10px, 2.8vw, 12px); color: var(--text-secondary); background: var(--bg-input); padding: 2px 8px; border-radius: 4px; }
.order-route { font-size: clamp(13px, 3.6vw, 15px); color: var(--text-primary); margin-bottom: 8px; }
.order-arrow { color: var(--accent); margin: 0 4px; font-size: clamp(10px, 2.8vw, 12px); }
.order-footer { display: flex; justify-content: space-between; align-items: center; }
.order-net { font-size: clamp(14px, 3.8vw, 16px); font-weight: 600; font-family: 'JetBrains Mono', monospace; }
.order-detail { font-size: clamp(12px, 3.2vw, 13px); color: var(--text-secondary); }

/* м •мӮ° л°” */
.summary-bar { background: var(--bg-secondary); border: 1px solid var(--border); border-radius: var(--radius); padding: 14px 16px; margin: 8px 16px 0; }
.summary-row { display: flex; justify-content: space-between; align-items: center; }
.summary-row + .summary-row { margin-top: 8px; padding-top: 8px; border-top: 1px solid var(--border); }
.summary-key { font-size: clamp(12px, 3.2vw, 13px); color: var(--text-secondary); }
.summary-val { font-size: clamp(13px, 3.5vw, 14px); font-weight: 600; font-family: 'JetBrains Mono', monospace; }

/* мҳӨлІ„л Ҳмқҙ/л°”н…ҖмӢңнҠё */
.overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.7); z-index: 200; opacity: 0; pointer-events: none; transition: opacity 0.25s; }
.overlay.show { opacity: 1; pointer-events: all; }
.bottom-sheet { position: fixed; bottom: 0; left: 50%; transform: translateX(-50%) translateY(100%); width: 100%; max-width: 480px; background: var(--bg-secondary); border-radius: 18px 18px 0 0; z-index: 201; transition: transform 0.3s cubic-bezier(0.32,0.72,0,1); max-height: 92vh; display: flex; flex-direction: column; overflow: hidden; }
.bottom-sheet.show { transform: translateX(-50%) translateY(0); }
.sheet-handle { width: 40px; height: 4px; background: var(--border); border-radius: 4px; margin: 12px auto 0; flex-shrink: 0; }
.sheet-header { padding: 12px 16px 10px; border-bottom: 1px solid var(--border); flex-shrink: 0; display:flex; align-items:center; justify-content:space-between; }
.sheet-title { font-size: clamp(14px, 4vw, 16px); font-weight: 700; }
.sheet-body { flex: 1; min-height: 0; overflow-y: auto; padding: 16px; }
.sheet-body::-webkit-scrollbar { display: none; }
.sheet-footer { padding: 12px 16px; border-top: 1px solid var(--border); flex-shrink: 0; display: flex; gap: 10px; padding-bottom: calc(12px + env(safe-area-inset-bottom)); }

/* лӮ м§ң л„Өл№„ */
.date-nav { display: flex; align-items: center; justify-content: center; gap: 16px; padding: 12px 16px; background: var(--bg-secondary); border-bottom: 1px solid var(--border); }
.date-nav-btn { background: var(--bg-input); border: 1px solid var(--border); color: var(--text-primary); width: 36px; height: 36px; border-radius: 8px; cursor: pointer; display:flex; align-items:center; justify-content:center; }
.date-nav-btn:active { background: var(--border); }
.date-nav-title { font-size: 15px; font-weight: 700; min-width: 160px; text-align: center; color: var(--text-primary); }

/* л¶ҖлӘЁ мӢӨмҲҳмһ… л°” лӮҙл¶Җ */
.parent-bar { display: flex; align-items: stretch; background: var(--bg-secondary); }
.parent-bar-item { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 10px 4px; gap: 4px; }
.parent-bar-label { font-size: clamp(11px, 3vw, 13px); color: var(--text-muted); font-weight: 500; white-space: nowrap; }
.parent-bar-val { font-size: clamp(13px, 3.6vw, 17px); font-weight: 700; font-family: 'JetBrains Mono', monospace; white-space: nowrap; }
.parent-bar-divider { width: 1px; background: var(--border); margin: 8px 0; flex-shrink: 0; }

/* FAB */
.fab { position: fixed; bottom: calc(148px + env(safe-area-inset-bottom)); right: calc(50% - 228px); width: 52px; height: 52px; background: var(--accent); border-radius: 50%; display: flex; align-items: center; justify-content: center; border: none; cursor: pointer; box-shadow: 0 4px 20px rgba(249,115,22,0.4); z-index: 50; }
.fab:active { transform: scale(0.93); }
@media (max-width: 480px) { .fab { right: 16px; } }

/* нңҙл¬ҙ л°°м§Җ */
.holiday-badge { display: inline-flex; align-items: center; gap: 4px; background: var(--bg-input); border: 1px solid var(--border); border-radius: 6px; padding: 4px 10px; font-size: 12px; color: var(--text-secondary); margin: 6px 16px 0; }

/* л¶„лҰ¬м„  */
.divider { height: 1px; background: var(--border); margin: 8px 0; }

/* кі м •м§Җм¶ң м•„мқҙн…ң */
.fixed-item { display: flex; align-items: center; justify-content: space-between; padding: 12px 14px; background: var(--bg-input); border-radius: var(--radius-sm); margin-bottom: 8px; }
.fixed-item-info { flex: 1; }
.fixed-item-name { font-size: 14px; color: var(--text-primary); font-weight: 500; }
.fixed-item-amount { font-size: 13px; color: var(--expense); font-family: 'JetBrains Mono', monospace; margin-top: 2px; }
.fixed-item-actions { display: flex; align-items: center; gap: 8px; }

/* көҗнҶөл№„ лӢӨмӨ‘ */
.transport-item { display: flex; gap: 8px; margin-bottom: 8px; align-items: center; }
.transport-item .form-input { flex: 1; }
.transport-type-sel { background: var(--bg-input); border: 1px solid var(--border); border-radius: var(--radius-sm); padding: 12px 10px; color: var(--text-primary); font-size: 14px; font-family: 'Noto Sans KR',sans-serif; outline: none; min-width: 90px; }

/* м •мӮ° кі„мӮ° л°•мҠӨ */
.calc-box { background: var(--bg-primary); border: 1px solid var(--accent); border-radius: var(--radius-sm); padding: 14px; margin-top: 16px; }
.calc-row { display: flex; justify-content: space-between; align-items: center; font-size: 13px; margin-bottom: 6px; }
.calc-row.total { border-top: 1px solid var(--border); padding-top: 8px; margin-top: 2px; font-weight: 700; font-size: 15px; }
.calc-key { color: var(--text-secondary); }
.calc-val { font-family: 'JetBrains Mono', monospace; }

/* мӣ” кІ°мӮ° кі м •м§Җм¶ң лҰ¬мҠӨнҠё */
.monthly-fixed { background: var(--expense-dim); border: 1px solid rgba(239,68,68,0.2); border-radius: var(--radius-sm); padding: 12px 14px; margin-bottom: 8px; }
.monthly-fixed-row { display: flex; justify-content: space-between; font-size: 13px; margin-bottom: 4px; }
.monthly-fixed-row:last-child { margin-bottom: 0; }

/* нҶ мҠӨнҠё */
.toast { position: fixed; top: 60px; left: 50%; transform: translateX(-50%) translateY(-80px); background: #333; color: #fff; padding: 10px 20px; border-radius: 20px; font-size: 13px; z-index: 9999; transition: transform 0.3s, opacity 0.3s; white-space: nowrap; opacity: 0; pointer-events: none; }
.toast.show { transform: translateX(-50%) translateY(0); opacity: 1; }

/* м• лӢҲл©”мқҙм…ҳ */
@keyframes slideUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
.animate-in { animation: slideUp 0.25s ease; }

/* нҷҲ мӣ” н—ӨлҚ” - sticky */
.home-month-header { position: sticky; top: 0; z-index: 10; padding: 10px 14px; display: flex; align-items: center; justify-content: center; gap: 16px; background: var(--bg-secondary); border-bottom: 1px solid var(--border); }
.home-month-title { font-size: clamp(15px, 4.2vw, 17px); font-weight: 700; min-width: 120px; text-align: center; font-family: 'Noto Sans KR',sans-serif; }
.home-month-nav { display: flex; gap: 6px; }
.home-month-nav-btn { background: var(--bg-input); border: 1px solid var(--border); color: var(--text-primary); width: 30px; height: 30px; border-radius: 8px; cursor: pointer; display: flex; align-items: center; justify-content: center; font-size: 18px; line-height: 1; }

/* мқјмҲҳлі„ лҰ¬мҠӨнҠё */
.day-list { margin: 0 8px 12px; display: flex; flex-direction: column; gap: 6px; background: transparent; }

/* лӮ м§ң н–ү: м№ҙл“ңнҳ• мӮ¬к°Ғл°•мҠӨ */
.day-row {
  display: flex;
  align-items: center;
  padding: 10px 12px;
  min-height: 62px;
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-radius: 12px;
  box-shadow: 0 1px 4px rgba(0,0,0,0.06);
  transition: background 0.12s, box-shadow 0.12s;
  gap: 0;
}
.day-row:active { box-shadow: 0 0px 2px rgba(0,0,0,0.08); background: var(--bg-secondary); }
.day-row-today { border-color: var(--accent) !important; background: var(--accent-dim) !important; box-shadow: 0 2px 8px rgba(230,126,0,0.15) !important; }

/* col1: лӮ м§ң */
.dr-date { display: flex; align-items: center; gap: 3px; white-space: nowrap; width: 72px; flex-shrink: 0; }
.day-num-txt { font-size: clamp(15px, 4vw, 17px); font-weight: 700; font-family: 'JetBrains Mono', monospace; }
.day-name-txt { font-size: clamp(11px, 3vw, 13px); font-weight: 500; }

// ===================== DB =====================
let db;
function initDB() {
  return new Promise((res, rej) => {
    const req = indexedDB.open('DriverLedger', 2);
    req.onupgradeneeded = e => {
      const d = e.target.result;
      if (!d.objectStoreNames.contains('orders')) {
        const s = d.createObjectStore('orders', { keyPath:'id', autoIncrement:true });
        s.createIndex('date','date',{unique:false});
      }
      if (!d.objectStoreNames.contains('settings')) d.createObjectStore('settings', { keyPath:'key' });
      if (!d.objectStoreNames.contains('addrHistory')) d.createObjectStore('addrHistory', { keyPath:'addr' });
    };
    req.onsuccess = e => { db = e.target.result; res(); };
    req.onerror = rej;
  });
}
function dbGetAll(store) {
  return new Promise((res, rej) => {
    const req = db.transaction(store,'readonly').objectStore(store).getAll();
    req.onsuccess = e => res(e.target.result);
    req.onerror = rej;
  });
}
function dbPut(store, obj) {
  return new Promise((res, rej) => {
    const req = db.transaction(store,'readwrite').objectStore(store).put(obj);
    req.onsuccess = e => res(e.target.result);
    req.onerror = rej;
  });
}
function dbDelete(store, key) {
  return new Promise((res, rej) => {
    const req = db.transaction(store,'readwrite').objectStore(store).delete(key);
    req.onsuccess = e => res(e.target.result);
    req.onerror = rej;
  });
}
async function loadData() {
  orders = await dbGetAll('orders');
  addrHistory = await dbGetAll('addrHistory');
  const savedSettings = await dbGetAll('settings');
  for (const s of savedSettings) {
    if (s.key === 'fixedExpenses') settings.fixedExpenses = s.value;
    if (s.key === 'addrAutocomplete') settings.addrAutocomplete = s.value;
    if (s.key === 'workType') settings.workType = s.value;
    if (s.key === 'kakaoAffiliateFee') settings.kakaoAffiliateFee = s.value;
    if (s.key === 'fontSize') settings.fontSize = s.value;
    if (s.key === 'platformList') {
      let loaded = s.value.map(p => {
        if (!p.types) p.types = [p.type || 'delivery'];
        if (p.active === undefined) p.active = true;
        // л Ҳкұ°мӢң: nameмқҙ н•©міҗм§„ кІҪмҡ° DEFAULT кё°мӨҖмңјлЎң көҗм •
        const def = DEFAULT_PLATFORMS.find(function(d){ return d.id === p.id; });
        if (def) { p.name = def.name; p.cls = def.cls; }  // typesлҠ” мӮ¬мҡ©мһҗ м„Өм • мЎҙмӨ‘
        return p;
      });
      // id кё°мӨҖ мӨ‘ліө м ңкұ° (м•һмӘҪ мҡ°м„ )
      const seen = {};
      loaded = loaded.filter(function(p) {
        if (seen[p.id]) return false;
        seen[p.id] = true;
        return true;
      });
      // DEFAULT_PLATFORMSм—җ мһҲлҠ”лҚ° DBм—җ м—ҶлҠ” н•ӯлӘ© м¶”к°Җ
      DEFAULT_PLATFORMS.forEach(function(def) {
        if (!seen[def.id]) { loaded.push({...def}); seen[def.id] = true; }
      });
      platformList = loaded;
    }
  }
  rebuildPlatforms();
}
async function saveSettings() {
  await dbPut('settings', { key:'fixedExpenses', value: settings.fixedExpenses });
  await dbPut('settings', { key:'addrAutocomplete', value: settings.addrAutocomplete });
  await dbPut('settings', { key:'workType', value: settings.workType });
  await dbPut('settings', { key:'platformList', value: platformList });
  await dbPut('settings', { key:'kakaoAffiliateFee', value: settings.kakaoAffiliateFee });
  await dbPut('settings', { key:'fontSize', value: settings.fontSize });
  rebuildPlatforms();
}

async function saveAddrHistory(addr) {
  if (!addr || addr.trim().length < 2) return;
  addr = addr.trim();
  const existing = addrHistory.find(h=>h.addr===addr);
  if (existing) {
    existing.count++;
    existing.lastUsed = Date.now();
    await dbPut('addrHistory', existing);
  } else {
    const newEntry = { addr, count:1, lastUsed:Date.now() };
    addrHistory.push(newEntry);
    await dbPut('addrHistory', newEntry);
  }
}
function searchAddr(query) {
  if (!query || query.length < 1) return [];
  const q = query.trim().toLowerCase();
  return addrHistory
    .filter(h => h.addr.toLowerCase().includes(q))
    .sort((a,b) => (b.count*1000 + b.lastUsed/1e10) - (a.count*1000 + a.lastUsed/1e10))
    .slice(0, 6)
    .map(h=>h.addr);
}
function closeAddrDropdown() {
  const d = document.getElementById('addrDropdown');
  if (d) d.remove();
}
function showAddrDropdown(inputEl, query) {
  closeAddrDropdown();
  if (!settings.addrAutocomplete) return;
  const results = searchAddr(query);
  if (results.length === 0) return;
  const dropdown = document.createElement('div');
  dropdown.id = 'addrDropdown';
  dropdown.style.cssText = `
    position:absolute;z-index:9999;background:var(--bg-card);
    border:1px solid var(--border);border-radius:8px;overflow:hidden;
    box-shadow:0 4px 16px rgba(0,0,0,0.4);
    width:${inputEl.offsetWidth}px;
  `;
  results.forEach(addr => {
    const item = document.createElement('div');
    item.style.cssText = 'padding:10px 14px;font-size:13px;color:var(--text-primary);cursor:pointer;border-bottom:1px solid var(--border);';
    item.textContent = addr;
    item.onmousedown = (e) => { e.preventDefault(); inputEl.value = addr; inputEl.dispatchEvent(new Event('input')); closeAddrDropdown(); };
    item.ontouchstart = (e) => { e.preventDefault(); inputEl.value = addr; inputEl.dispatchEvent(new Event('input')); closeAddrDropdown(); };
    dropdown.appendChild(item);
  });
  const rect = inputEl.getBoundingClientRect();
  const sheetBody = inputEl.closest('.sheet-body') || document.querySelector('.bottom-sheet.show') || document.body;
  const sheetRect = sheetBody.getBoundingClientRect();
  dropdown.style.top = (rect.bottom - sheetRect.top + sheetBody.scrollTop) + 'px';
  dropdown.style.left = (rect.left - sheetRect.left) + 'px';
  dropdown.style.position = 'absolute';
  if (!sheetBody.style.position || sheetBody.style.position === 'static') {
    sheetBody.style.position = 'relative';
  }
  sheetBody.appendChild(dropdown);
}
function bindAddrInput(inputEl) {
  if (!inputEl) return;
  inputEl.addEventListener('input', () => { showAddrDropdown(inputEl, inputEl.value); });
  inputEl.addEventListener('focus', () => { if (inputEl.value) showAddrDropdown(inputEl, inputEl.value); });
  inputEl.addEventListener('blur', () => { setTimeout(closeAddrDropdown, 200); });
}

function fmt(n) {
  if (!n && n!==0) return 'вӮ©0';
  return 'вӮ©' + Math.abs(Math.round(n)).toLocaleString();
}
function fmtAmt(n) {
  n = Math.round(n||0);
  return (n < 0 ? '-' : '') + 'вӮ©' + Math.abs(n).toLocaleString();
}
function fmtSign(n) {
  n = Math.round(n||0);
  return (n>=0?'+':'-') + 'вӮ©' + Math.abs(n).toLocaleString();
}
function dateStr(d) {
  return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0');
}
function dateKo(d) {
  const days=['мқј','мӣ”','нҷ”','мҲҳ','лӘ©','кёҲ','нҶ '];
  return d.getFullYear()+'л…„ '+(d.getMonth()+1)+'мӣ” '+d.getDate()+'мқј ('+days[d.getDay()]+')';
}
function monthStr(d) { return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0'); }
function monthKo(d) { return d.getFullYear()+'л…„ '+(d.getMonth()+1)+'мӣ”'; }

let _toastTimer = null;

}

function calcOrderNet(o) {
  const netAmt = o.fare || 0;  // мӢӨмҲҳл №м•Ў лӘЁл“ң: fare = мӢӨмҲҳл №м•Ў
  const extraRoute = o.extraRoute || 0;
  const tip = o.tip || 0;
  const toll = o.toll || 0;
  const transTotal = (o.transports||[]).reduce((s,t)=>s+(t.amount||0),0);

  if (o.isNetAmount) {
    // м—ӯмӮ°: мӢӨмҲҳл №м•Ў вҶ’ л§Өм¶ң
    const feeRate = (PLATFORMS[o.platform]||{feeRate:0.2}).feeRate;
    const grossFare = feeRate < 1 ? Math.round(netAmt / (1 - feeRate)) : netAmt;
    const fee = grossFare - netAmt;
    const income = grossFare + extraRoute + tip;
    const expense = fee + toll + transTotal;
    return { income, fare: grossFare, netFare: netAmt, extraRoute, tip, fee, insurance:0, affiliateFee:0, tmapExtra:0, toll, transTotal, expense, net: income - expense };
  }

  const fare = netAmt;
  const fee = o.feeOverride != null ? o.feeOverride : Math.round(fare * (PLATFORMS[o.platform]||{feeRate:0.2}).feeRate);
  const insurance = o.perCallInsurance || 0;
  const affiliateFee = o.affiliateFee || 0;
  const tmapExtra = o.tmapExtraFee || 0;
  const income = fare + extraRoute + tip;
  const expense = fee + insurance + affiliateFee + tmapExtra + toll + transTotal;
  return { income, fare, extraRoute, tip, fee, insurance, affiliateFee, tmapExtra, toll, transTotal, expense, net: income - expense };
}

function updateParentBar() {
  const pbCount = document.getElementById('pb_todayNet');
  const pbInc   = document.getElementById('pb_income');
  const pbExp   = document.getElementById('pb_expense');
  const pbNet   = document.getElementById('pb_net');
  const lbCount = document.getElementById('pb_label_count');
  const lbNet   = document.getElementById('pb_label_net');
  if (!pbCount) return;

  let cnt, inc, exp, net;

  if (currentView === 'home') {
    // мӣ”лӢ¬л Ҙ кё°мӨҖ
    const y = homeMonth.getFullYear(), m = homeMonth.getMonth();
    const monthOrders = orders.filter(o => {
      const d = new Date(o.date);
      return d.getFullYear()===y && d.getMonth()===m;
    });
    cnt = monthOrders.length;
    inc = monthOrders.reduce((s,o)=>s+calcOrderNet(o).income,0);
    exp = monthOrders.reduce((s,o)=>s+calcOrderNet(o).expense,0);
    net = inc - exp;
    if (lbCount) lbCount.textContent = (m+1) + 'мӣ” кұҙмҲҳ';
    if (lbNet)   lbNet.textContent   = (m+1) + 'мӣ” мҲңмҲҳмһ…';
  } else if (currentView === 'monthly') {
    // кІ°мӮ° нҷ”л©ҙ: monthlyDate кё°мӨҖ мӣ”
    const y = monthlyDate.getFullYear(), m = monthlyDate.getMonth();
    const monthOrders = orders.filter(o => {
      const d = new Date(o.date);
      return d.getFullYear()===y && d.getMonth()===m;
    });
    cnt = monthOrders.length;
    inc = monthOrders.reduce((s,o)=>s+calcOrderNet(o).income,0);
    exp = monthOrders.reduce((s,o)=>s+calcOrderNet(o).expense,0);
    const rawNet = inc - exp;
    const fixedTotal = settings.fixedExpenses.filter(f=>f.active&&f.amount>0).reduce((s,f)=>s+(f.amount||0),0);
    net = (showFixedInResult && cnt > 0) ? rawNet - fixedTotal : rawNet;
    if (lbCount) lbCount.textContent = y + 'л…„ ' + (m+1) + 'мӣ” кұҙмҲҳ';
    if (lbNet)   lbNet.textContent   = y + 'л…„ ' + (m+1) + 'мӣ” мӢӨмҲҳмһ…';
  } else {
    // мқј кё°мӨҖ (journal)
    const jd = journalDate || currentDate;
    const today = dateStr(jd);
    const dayOrders = orders.filter(o=>o.date===today);
    cnt = dayOrders.length;
    inc = dayOrders.reduce((s,o)=>s+calcOrderNet(o).income,0);
    exp = dayOrders.reduce((s,o)=>s+calcOrderNet(o).expense,0);
    net = inc - exp;
    const jLabel = (jd.getMonth()+1) + '/' + jd.getDate();
    if (lbCount) lbCount.textContent = jLabel + ' кұҙмҲҳ';
    if (lbNet)   lbNet.textContent   = jLabel + ' мҲңмҲҳмһ…';
  }

  pbCount.textContent = cnt + 'кұҙ';
  pbCount.style.color = 'var(--text-primary)';
  pbInc.textContent = fmt(inc);
  pbInc.style.color = 'var(--income)';
  pbExp.textContent = '-'+fmt(exp);
  pbExp.style.color = 'var(--expense)';
  if (pbNet) {
    pbNet.textContent = fmt(net);
    pbNet.style.color = net>=0 ? 'var(--income)' : 'var(--expense)';
  }
  // в‘Ҙ н•ҳлӢЁл°” кёҲм•Ў мһҗлҸҷм¶•мҶҢ
  setTimeout(autoShrinkAmounts, 30);
}

function renderStats(c) {
  const fixedTotal = settings.fixedExpenses.filter(f=>f.active&&f.amount>0).reduce((s,f)=>s+(f.amount||0),0);
  const months = [];
  let yearTotal = 0;
  for (let m=1; m<=12; m++) {
    const ms = statsYear + '-' + String(m).padStart(2,'0');
    const mo = orders.filter(o=>o.date&&o.date.startsWith(ms));
    const totalIncome = mo.reduce((s,o)=>s+calcOrderNet(o).income,0);
    const totalExpense = mo.reduce((s,o)=>s+calcOrderNet(o).expense,0);
    const net = totalIncome - totalExpense;
    const count = mo.length;
    const fixedAmt = (count > 0 && showFixedInResult) ? fixedTotal : 0;
    const finalNet = count > 0 ? net - fixedAmt : 0;
    months.push({ m, totalIncome, totalExpense, fixedAmt, net, finalNet, count });
    yearTotal += (count > 0 ? finalNet : 0);
  }
  const maxVal = Math.max.apply(null, months.map(x=>x.totalIncome).concat([1]));

  const allYears = Array.from(new Set(orders.map(function(o){ return o.date ? parseInt(o.date.slice(0,4)) : null; }).filter(Boolean))).sort();
  if (allYears.length === 0) allYears.push(new Date().getFullYear());
  if (allYears.indexOf(statsYear) === -1) statsYear = allYears[allYears.length-1];
  const yearOptions = allYears.map(function(y){
    return '<option value="'+y+'"'+(y===statsYear?' selected':'')+'>'+y+'л…„</option>';
  }).join('');

  // нҶөкі„: кІ°мӮ°м—җм„ң м„Өм •н•ң к°’мқ„ л”°лҰ„ (ліҖкІҪ л¶Ҳк°Җ)
  const statsToggleRow =
    '<div style="display:flex;align-items:center;justify-content:space-between;padding:8px 16px;background:var(--bg-card);border-bottom:1px solid var(--border);">' +
    '<span style="font-size:12px;color:var(--text-muted);">мӣ” кі м •м§Җм¶ң м°Ёк°җ В· кІ°мӮ°м—җ л”°лҰ„</span>' +
    '<span style="font-size:12px;font-weight:700;padding:2px 10px;border-radius:10px;background:' + (showFixedInResult?'rgba(34,197,94,0.15)':'var(--bg-input)') + ';color:' + (showFixedInResult?'var(--income)':'var(--text-muted)') + ';">' + (showFixedInResult?'ON':'OFF') + '</span>' +
    '</div>';

  const nav =
    '<div style="display:flex;align-items:center;justify-content:space-between;padding:10px 16px;border-bottom:1px solid var(--border);">' +
    '<button onclick="changeStatsYear(-1)" style="background:none;border:none;color:var(--text-secondary);font-size:22px;cursor:pointer;padding:4px 8px;">вҖ№</button>' +
    '<select onchange="statsYear=parseInt(this.value);render()" style="font-size:15px;font-weight:700;color:var(--text-primary);background:transparent;border:none;outline:none;text-align:center;cursor:pointer;">' + yearOptions + '</select>' +
    '<button onclick="changeStatsYear(1)" style="background:none;border:none;color:var(--text-secondary);font-size:22px;cursor:pointer;padding:4px 8px;">вҖә</button>' +
    '</div>';

  // лІ”лЎҖ
  const legendItems = [
    { color:'var(--income)', label:'мҲңмҲҳмқө' },
    { color:'#ef4444', label:'мҲҳмҲҳлЈҢВ·көҗнҶөл№„' },
  ];
  if (showFixedInResult) legendItems.push({ color:'#8b5cf6', label:'н”„лЎңк·ёлһЁ мӮ¬мҡ©лЈҢ' });
  const legend = '<div style="display:flex;align-items:center;gap:12px;padding:7px 16px;border-bottom:1px solid var(--border);flex-wrap:wrap;">' +
    legendItems.map(function(l) {
      return '<div style="display:flex;align-items:center;gap:4px;">' +
        '<div style="width:10px;height:10px;border-radius:2px;background:' + l.color + ';flex-shrink:0;"></div>' +
        '<span style="font-size:11px;color:var(--text-muted);">' + l.label + '</span>' +
        '</div>';
    }).join('') + '</div>';

  // 3мӨ„ л§үлҢҖ (кё°мӨҖ: н•ҙлӢ№ мӣ” мҙқ мҲҳмһ… 100%)
  let listHtml = '';
  months.forEach(function(x) {
    const base = maxVal;
    const wNet   = x.count > 0 && x.finalNet > 0 ? Math.round(x.finalNet / base * 100) : 0;
    const wExp   = x.count > 0 ? Math.round(x.totalExpense / base * 100) : 0;
    const wFixed = (x.count > 0 && showFixedInResult) ? Math.round(x.fixedAmt / base * 100) : 0;
    const netColor = x.finalNet >= 0 ? 'var(--income)' : 'var(--expense)';
    function bar(w, color) {
      return '<div style="height:7px;background:var(--bg-input);border-radius:4px;overflow:hidden;margin-bottom:2px;">' +
        (w > 0 ? '<div style="height:100%;width:' + w + '%;background:' + color + ';border-radius:4px;"></div>' : '') +
        '</div>';
    }
    listHtml +=
      '<div onclick="jumpToMonth(' + x.m + ')" style="display:flex;align-items:center;padding:9px 16px;border-bottom:1px solid var(--border);cursor:pointer;gap:12px;">' +
      '<div style="width:28px;font-size:13px;color:var(--text-muted);flex-shrink:0;">' + x.m + 'мӣ”</div>' +
      '<div style="flex:1;">' +
        bar(wNet, 'var(--income)') +
        bar(wExp, '#ef4444') +
        (showFixedInResult ? bar(wFixed, '#8b5cf6') : '') +
      '</div>' +
      '<div style="width:88px;text-align:right;font-size:13px;font-weight:700;color:' + netColor + ';">' + (x.count > 0 ? fmtAmt(x.finalNet) : 'вҖ”') + '</div>' +
      '</div>';
  });

  const totalBox =
    '<div style="margin:16px;padding:14px;background:var(--bg-card);border:1px solid var(--border);border-radius:12px;display:flex;justify-content:space-between;">' +
    '<span style="color:var(--text-muted);">' + statsYear + 'л…„ н•©кі„</span>' +
    '<span style="font-weight:800;color:' + (yearTotal>=0?'var(--income)':'var(--expense)') + ';">' + fmtAmt(yearTotal) + '</span></div>';

  c.innerHTML =
    '<div>' +
    nav + tabBar() + statsToggleRow + legend +
    '<div>' + totalBox + listHtml + '</div>' +
    '</div>';
  bindMonthlySwipe(c);
}

function changeStatsYear(d) { statsYear += d; render(); }

async function togglePlatformType(i, type, val) {
  const types = platformList[i].types;
  if (val && !types.includes(type)) types.push(type);
  if (!val) platformList[i].types = types.filter(t=>t!==type);
  if (platformList[i].types.length===0) { platformList[i].types=[type]; return; }
  await saveSettings();
}

function openAddPlatformSheet() {

  document.getElementById('newP_name').value='';
  document.getElementById('newP_fee').value='20';
  document.getElementById('newP_programFee').value='';

async function addPlatform() {
  const name = document.getElementById('newP_name').value.trim();
  if (!name) { alert('н”Ңлһ«нҸј мқҙлҰ„мқ„ мһ…л Ҙн•ҳм„ёмҡ”'); return; }
  const types = [];
  if (document.getElementById('newP_delivery').checked) types.push('delivery');
  if (document.getElementById('newP_transport').checked) types.push('transport');
  if (types.length===0) { alert('лҢҖлҰ¬ лҳҗлҠ” нғҒмҶЎмқ„ м„ нғқн•ҳм„ёмҡ”'); return; }
  const feeRate = (parseFloat(document.getElementById('newP_fee').value)||20)/100;
  const programFee = parseInt(document.getElementById('newP_programFee').value)||0;
  const id = 'custom_'+Date.now();
  platformList.push({ id, name, types, cls:'custom', feeRate, programFee, active:true, builtIn:false });
  await saveSettings();
  closeSheet();
  render();
}

function orderItemHTML(o, editable) {
  const calc = calcOrderNet(o);
  const p = PLATFORMS[o.platform] || {};
  const time = o.datetime ? (o.datetime.split(' ')[1]||'').substring(0,5) : '';
  const start = o.startAddr||'м¶ңл°ңм§Җ';
  const end = o.endAddr||'лҸ„м°©м§Җ';
  const visits = o.visitAddrs || (o.visitAddr ? [o.visitAddr] : []);

  // кІҪлЎң HTML
  let routeHtml = '<span>' + start + '</span>';
  visits.forEach(function(v) {
    routeHtml += '<span class="order-arrow">в–¶</span><span style="color:var(--text-muted);">' + v + '</span>';
  });
  routeHtml += '<span class="order-arrow">в–¶</span><span>' + end + '</span>';

  // мҲҳмһ…/м§Җм¶ң н…ҚмҠӨнҠё
  let incParts = o.isNetAmount
    ? ['мӢӨмҲҳл № ' + fmt(o.fare) + ' (л§Өм¶ң ' + fmt(calc.fare) + ')']
    : ['мҡ”кёҲ ' + fmt(calc.fare)];
  if (calc.extraRoute > 0) incParts.push('кІҪмң  +' + fmt(calc.extraRoute));
  if (calc.tip > 0) incParts.push('нҢҒ +' + fmt(calc.tip));

  let expParts = [];
  if (calc.fee > 0) expParts.push('мҲҳмҲҳлЈҢ -' + fmt(calc.fee));
  if (calc.insurance > 0) expParts.push('ліҙн—ҳ -' + fmt(calc.insurance));
  if (calc.affiliateFee > 0) expParts.push('м ңнңҙмҪң -' + fmt(calc.affiliateFee));
  if (calc.tmapExtra > 0) expParts.push('м¶”к°ҖмҲҳмҲҳлЈҢ -' + fmt(calc.tmapExtra));
  if (calc.toll > 0) expParts.push('нҶөн–үлЈҢ -' + fmt(calc.toll));
  (o.transports||[]).forEach(function(t) {
    if (t.amount > 0) expParts.push('көҗнҶөл№„(' + (t.type||'кё°нғҖ') + ') -' + fmt(t.amount));
  });

  const netColor = calc.net >= 0 ? 'var(--income)' : 'var(--expense)';
  var isSelected = _selectMode && _selectedIds.indexOf(o.id) >= 0;
  var onclickVal = editable ? (_selectMode ? 'toggleOrderSelect(' + o.id + ')' : 'editOrder(' + o.id + ')') : '';
  var selStyle = isSelected ? 'box-shadow:inset 0 0 0 2px var(--accent);' : '';

  return '<div class="order-item ' + (p.cls||'') + '" data-oid="' + o.id + '" onclick="' + onclickVal + '" style="' + selStyle + '">' +
    (_selectMode ? '<div style="position:absolute;top:10px;right:10px;z-index:3;width:22px;height:22px;border-radius:50%;border:2px solid ' + (isSelected?'var(--accent)':'var(--border)') + ';background:' + (isSelected?'var(--accent)':'var(--bg-input)') + ';display:flex;align-items:center;justify-content:center;flex-shrink:0;">' + (isSelected?'<svg width="12" height="12" viewBox="0 0 12 12" fill="none"><path d="M2 6l3 3 5-5" stroke="#fff" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>':'') + '</div>' : '') +
    '<div class="order-item-header">' +
    '<span class="order-time">' + time + '</span>' +
    '<div style="display:flex;align-items:center;gap:5px;">' +
    '<span class="order-type-badge" style="padding:2px 6px;border-radius:4px;background:' + ((o.orderType||p.type)==='transport'?'rgba(20,184,166,0.15)':'rgba(212,168,83,0.15)') + ';color:' + ((o.orderType||p.type)==='transport'?'var(--logi)':'var(--accent)') + ';">' + ((o.orderType||p.type)==='transport'?'нғҒмҶЎ':'лҢҖлҰ¬') + '</span>' +
    '<span class="order-platform">' + (p.name||o.platform) + '</span>' +
    '</div>' +
    '</div>' +
    '<div class="order-route">' + routeHtml + '</div>' +
    '<div class="order-footer">' +
    '<div class="order-detail">' +
    '<div style="color:var(--income);">' + incParts.join(' В· ') + '</div>' +
    (expParts.length ? '<div style="color:var(--expense);">' + expParts.join(' В· ') + '</div>' : '') +
    '</div>' +
    '<span class="order-net" style="color:' + netColor + ';">' + fmt(calc.net) + '</span>' +
    '</div>' +
    (o.remark ? '<div style="font-size:11px;color:var(--text-muted);margin-top:6px;">рҹ“қ ' + o.remark + '</div>' : '') +
    '</div>';
}

    _bulkPlatformMode = false;
    closeSheet();
    setTimeout(function() { applyBulkPlatform(pid); }, 200);
    return;
  }
  selectedPlatform = pid;
  var pendingEditId = _platformChangeForEdit;
  _platformChangeForEdit = null;
  // н”Ңлһ«нҸјмӢңнҠёл§Ң лӢ«кі  overlay мң м§Җ вҶ’ мҳӨлҚ”нҸј л°”лЎң м—ҙкё° (closeSheet л¶Ҳн•„мҡ”)
  document.getElementById('platformSheet').classList.remove('show');
  if (pendingEditId !== null) {
    editingOrderId = pendingEditId;
    var o = orders.find(function(x) { return x.id === pendingEditId; });
    if (o) { o.platform = pid; }
    openOrderForm(pid, pendingEditId);
  } else {
    openOrderForm(pid, null);
  }
}

function setOrderType(type) {
  const btnD = document.getElementById('orderTypeDelivery');
  const btnT = document.getElementById('orderTypeTransport');
  if (!btnD) return;

  // м¶”к°Җ лӘЁл“ңм—җм„ң лӢӨлҘё нғӯ лҲ„лҘҙл©ҙ н•ҙлӢ№ нғҖмһ… н”Ңлһ«нҸј м„ нғқм°ҪмңјлЎң мқҙлҸҷ
  if (editingOrderId === null) {
    var curType = document.getElementById('orderSheetTitle').dataset.orderType || 'delivery';
    if (curType !== type) {
      // нҳ„мһ¬ мҳӨлҚ”нҸј лӢ«кі  н•ҙлӢ№ нғҖмһ… н”Ңлһ«нҸј м„ нғқмңјлЎң
      document.getElementById('orderSheet').classList.remove('show');
      platformSelectTab = type;
      showPlatformSelect();
      return;
    }
  }

  if (type === 'delivery') {
    btnD.style.background = 'var(--accent)'; btnD.style.borderColor = 'var(--accent)'; btnD.style.color = '#fff';
    btnT.style.background = 'transparent'; btnT.style.borderColor = 'var(--border)'; btnT.style.color = 'var(--text-muted)';
  } else {
    btnT.style.background = 'var(--logi)'; btnT.style.borderColor = 'var(--logi)'; btnT.style.color = '#fff';
    btnD.style.background = 'transparent'; btnD.style.borderColor = 'var(--border)'; btnD.style.color = 'var(--text-muted)';
  }
  // нҶөн–үлЈҢ н–ү: нғҒмҶЎмқј л•Ңл§Ң н‘ңмӢң
  var tollRow = document.getElementById('f_toll_row');
  if (tollRow) tollRow.style.display = (type === 'transport') ? '' : 'none';
  document.getElementById('orderSheetTitle').dataset.orderType = type;
}

  var _tollRow = document.getElementById('f_toll_row');

    '<option ' + (t.type==='кі мҶҚлІ„мҠӨ'?'selected':'') + '>кі мҶҚлІ„мҠӨ</option>' +

let transportCount = 0;
function addTransport() {
  transportCount++;
  const list = document.getElementById('transport_list');
  const div = document.createElement('div');
  div.innerHTML = transportItemHTML({type:'лІ„мҠӨ',amount:0}, transportCount);
  list.appendChild(div.firstChild);
  updateCalc();
}
function removeTransport(i) {
  const el = document.getElementById('tr_'+i);

}
function toggleTmapExtra() {
  const chk = document.getElementById('f_affiliate');
  const row = document.getElementById('tmap_extra_row');
  if (row) row.style.display = chk.checked ? 'block' : 'none';

function toggleTollPassenger(cb) {

function addVisitRow() {
  const list = document.getElementById('visitList');

  const idx = list.querySelectorAll('.visit-row').length;

  div.style.cssText = 'display:flex;gap:6px;align-items:center;';

function removeVisitRow(btn) {
  const row = btn.closest('div[style]');
  if (row) row.remove();
}
function getFormVisitAddrs() {
  return Array.from(document.querySelectorAll('.visit-row')).map(el=>el.value.trim()).filter(Boolean);
}
function toggleAffiliateHint(on) {
  var el = document.getElementById('f_affiliate_hint');
  if (el) el.style.display = on ? 'block' : 'none';
}

function toggleNetAmount() {
  var chk = document.getElementById('f_net_amount');
  var feeWrap = document.getElementById('f_fee_wrap');
  var hint = document.getElementById('f_net_hint');
  var feeEl = document.getElementById('f_fee_override');
  if (!chk) return;
  var isNet = chk.checked;
  if (feeWrap) {
    feeWrap.style.opacity = isNet ? '0.4' : '1';
    feeWrap.style.pointerEvents = isNet ? 'none' : '';
  }
  if (hint) hint.style.display = isNet ? 'inline' : 'none';
  if (feeEl) feeEl.value = isNet ? 0 : (function() {
    var p = PLATFORMS[selectedPlatform || (editingOrderId ? (orders.find(x=>x.id===editingOrderId)||{}).platform : null)];
    var fare = parseInt((document.getElementById('f_fare')||{}).value||0)||0;
    return p ? Math.round(fare * p.feeRate) : 0;
  })();
  updateCalc();
}

function onFareInput() {
  const p = PLATFORMS[selectedPlatform || (editingOrderId ? (orders.find(x=>x.id===editingOrderId)||{}).platform : null)];
  if (!p) return;
  const fare = parseInt(document.getElementById('f_fare').value||0)||0;
  const feeEl = document.getElementById('f_fee_override');
  var isNet = (document.getElementById('f_net_amount')||{}).checked;
  if (feeEl && !isNet) feeEl.value = Math.round(fare * p.feeRate);
  updateCalc();
}
function getFormTransports() {
  const list = document.getElementById('transport_list');
  if (!list) return [];
  const result = [];
  list.querySelectorAll('[id^="tr_type_"]').forEach(function(sel) {
    const i = sel.id.replace('tr_type_','');
    const amtEl = document.getElementById('tr_amt_'+i);
    const amt = amtEl ? (parseInt(amtEl.value)||0) : 0;
    if (amt > 0) result.push({ type: sel.value, amount: amt });
  });
  return result;
}
function updateCalc() {
  const pid = selectedPlatform || (editingOrderId ? (orders.find(x=>x.id===editingOrderId)||{}).platform : null);
  const p = PLATFORMS[pid];
  if (!p) return;
  const isNetMode = (document.getElementById('f_net_amount')||{}).checked || false;
  const fare = parseInt((document.getElementById('f_fare')||{}).value||0)||0;
  const extraRoute = parseInt((document.getElementById('f_extraRoute')||{}).value||0)||0;
  const tip = parseInt((document.getElementById('f_tip')||{}).value||0)||0;
  const toll = parseInt((document.getElementById('f_toll')||{}).value||0)||0;
  const isAffiliate = (document.getElementById('f_affiliate')||{}).checked||false;
  const tmapExtra = parseInt((document.getElementById('f_tmap_extra')||{}).value||0)||0;
  const transports = getFormTransports();
  const transTotal = transports.reduce((s,t)=>s+t.amount,0);

  let income, fee, insuranceFee = 0, affiliateFee = 0, feeLabel = '';
  if (isNetMode) {
    // мӢӨмҲҳл №м•Ў м—ӯмӮ°: мһ…л Ҙк°’ = мҲңмҲҳмһ… вҶ’ л§Өм¶ң = мҲңмҲҳмһ… / (1 - мҲҳмҲҳлЈҢмңЁ)
    const grossFare = p.feeRate < 1 ? Math.round(fare / (1 - p.feeRate)) : fare;
    fee = grossFare - fare;
    income = grossFare + extraRoute + tip;
    feeLabel = 'мҲҳмҲҳлЈҢ (м—ӯмӮ° ' + Math.round(p.feeRate*100) + '%)';
  } else {
    income = fare + extraRoute + tip;
    const autoFee = Math.round(fare * p.feeRate);
    const feeOverrideEl = document.getElementById('f_fee_override');
    fee = feeOverrideEl ? (parseInt(feeOverrideEl.value||0)||0) : autoFee;
    feeLabel = fee !== autoFee ? 'мҲҳмҲҳлЈҢ (м§Ғм ‘мһ…л Ҙ)' : 'мҲҳмҲҳлЈҢ (' + (p.feeRate*100) + '%)';
    if (p.id==='daegu') insuranceFee = 800;
    if (p.id==='kakao' && isAffiliate) {
      var _affFeeEl = document.getElementById('f_affiliate_fee');
      affiliateFee = _affFeeEl ? (parseInt(_affFeeEl.value)||800) : (settings.kakaoAffiliateFee||800);
    }
  }
  const expense = fee + insuranceFee + affiliateFee + (!isNetMode&&p.id==='tmap'&&isAffiliate?tmapExtra:0) + toll + transTotal;
  const net = income - expense;

  const box = document.getElementById('calcBox');
  if (!box) return;
  let rows = '';
  if (isNetMode) {
    rows += '<div class="calc-row"><span>л§Өм¶ң (м—ӯмӮ°)</span><span class="calc-val income-color">' + fmt(income - extraRoute - tip) + '</span></div>';
    rows += '<div class="calc-row"><span>' + feeLabel + '</span><span class="calc-val expense-color">-' + fmt(fee) + '</span></div>';
    rows += '<div class="calc-row"><span style="color:var(--accent);">мӢӨмҲҳл №м•Ў нҷ•мқё</span><span class="calc-val accent-color">' + fmt(fare) + '</span></div>';
  } else {
    rows += '<div class="calc-row"><span>мҲҳмһ…</span><span class="calc-val income-color">' + fmt(income) + '</span></div>';
    rows += '<div class="calc-row"><span>' + feeLabel + '</span><span class="calc-val expense-color">-' + fmt(fee) + '</span></div>';
  }
  if (insuranceFee) rows += '<div class="calc-row"><span>кұҙлӢ№ ліҙн—ҳ</span><span class="calc-val expense-color">-' + fmt(insuranceFee) + '</span></div>';
  if (affiliateFee) rows += '<div class="calc-row"><span>м ңнңҙмҪң мҲҳмҲҳлЈҢ</span><span class="calc-val expense-color">-' + fmt(affiliateFee) + '</span></div>';
  if (toll) rows += '<div class="calc-row"><span>нҶөн–үлЈҢ</span><span class="calc-val expense-color">-' + fmt(toll) + '</span></div>';
  if (transTotal) rows += '<div class="calc-row"><span>көҗнҶөл№„</span><span class="calc-val expense-color">-' + fmt(transTotal) + '</span></div>';
  rows += '<div class="calc-row total"><span>мӢӨмҲҳмһ…</span><span class="calc-val ' + (net>=0?'income-color':'expense-color') + '">' + fmtSign(net) + '</span></div>';
  box.innerHTML = rows;
}

async function submitOrder() {
  const pid = selectedPlatform || (editingOrderId ? (orders.find(x=>x.id===editingOrderId)||{}).platform : null);
  const p = PLATFORMS[pid];
  if (!p) return;
  const dtVal = (document.getElementById('f_datetime')||{}).value;
  if (!dtVal) { showToast('лӮ м§ң/мӢңк°„мқ„ мһ…л Ҙн•ҙмЈјм„ёмҡ”'); return; }
  const datetime = dtVal.replace('T',' ');
  const date = datetime.split(' ')[0];
  const isNetAmount = (document.getElementById('f_net_amount')||{}).checked||false;
  const fare = parseInt((document.getElementById('f_fare')||{}).value||0)||0;
  const isAffiliate = (document.getElementById('f_affiliate')||{}).checked||false;
  const tmapExtraFee = parseInt((document.getElementById('f_tmap_extra')||{}).value||0)||0;
  var _affFeeInput = document.getElementById('f_affiliate_fee');
  var _affFeeVal = _affFeeInput ? (parseInt(_affFeeInput.value)||800) : (settings.kakaoAffiliateFee||800);
  // кёҲм•Ўмқҙ ліҖкІҪлҗҗмңјл©ҙ settingsм—җ м ҖмһҘ (лӢӨмқҢ мҳӨлҚ”м—җ мһҗлҸҷ м Ғмҡ©)
  if (pid==='kakao' && _affFeeInput && _affFeeVal !== settings.kakaoAffiliateFee) {
    settings.kakaoAffiliateFee = _affFeeVal;
    saveSettings();
  }
  const affiliateFee = (pid==='kakao'&&isAffiliate) ? _affFeeVal : 0;
  const perCallInsurance = pid==='daegu' ? 800 : 0;
  const toll = parseInt((document.getElementById('f_toll')||{}).value||0)||0;
  const autoFee = Math.round(fare * p.feeRate);
  const feeOverrideVal = parseInt((document.getElementById('f_fee_override')||{}).value||0)||0;
  const feeOverride = feeOverrideVal !== autoFee ? feeOverrideVal : null;

  const obj = {
    platform: pid,
    datetime, date,
    startAddr: (document.getElementById('f_start')||{}).value||'',
    endAddr: (document.getElementById('f_end')||{}).value||'',
    visitAddrs: getFormVisitAddrs(),
    fare,
    feeOverride,
    extraRoute: parseInt((document.getElementById('f_extraRoute')||{}).value||0)||0,
    tip: parseInt((document.getElementById('f_tip')||{}).value||0)||0,
    isNetAmount,
    isAffiliate: isNetAmount ? false : isAffiliate,
    affiliateFee: isNetAmount ? 0 : affiliateFee,
    tmapExtraFee: (!isNetAmount&&pid==='tmap'&&isAffiliate) ? tmapExtraFee : 0,
    perCallInsurance: isNetAmount ? 0 : perCallInsurance,
    toll,
    transports: getFormTransports(),
    remark: (document.getElementById('f_remark')||{}).value||'',
    orderType: (document.getElementById('orderSheetTitle')||{}).dataset&&document.getElementById('orderSheetTitle').dataset.orderType || (PLATFORMS[pid]&&PLATFORMS[pid].type) || 'delivery',
  };

  if (editingOrderId) {
    obj.id = editingOrderId;
    await dbPut('orders', obj);
    const idx = orders.findIndex(x=>x.id===editingOrderId);
    if (idx>=0) orders[idx] = obj;
    showToast('мҲҳм •лҗҳм—ҲмҠөлӢҲлӢӨ');
  } else {
    const id = await dbPut('orders', obj);
    obj.id = id;
    orders.push(obj);
    showToast('мҳӨлҚ”к°Җ м¶”к°Җлҗҳм—ҲмҠөлӢҲлӢӨ');
  }

  if (obj.startAddr) await saveAddrHistory(obj.startAddr);
  if (obj.endAddr) await saveAddrHistory(obj.endAddr);
  for (const v of (obj.visitAddrs||[])) await saveAddrHistory(v);
  // мӢңнҠё UI лӢ«кё°
  refreshAfterSheetClose();
}

async function backupToFile() {
  try {
    showToast('л°ұм—… мӨҖл№„ мӨ‘...', 5000);
    const data = {
      version: '2.0',
      exportDate: new Date().toISOString(),
      orders,
      settings,
      platformList,
      addrHistory,
      theme: localStorage.getItem('appTheme') || ''
    };
    const json = JSON.stringify(data);
    const zip = new JSZip();
    const fname = 'driver_ledger_' + dateStr(new Date()) + '.json';
    zip.file(fname, json);
    const blob = await zip.generateAsync({
      type:'blob',
      compression:'DEFLATE',
      compressionOptions:{ level:9 }
    }, function(meta) {
      if (meta.percent && meta.percent % 20 < 1) {
        showToast('л°ұм—… мӨ‘... ' + Math.round(meta.percent) + '%', 3000);
      }
    });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url; a.download = 'driver_ledger_' + dateStr(new Date()) + '.zip';
    document.body.appendChild(a);
    a.click();
    setTimeout(function() { document.body.removeChild(a); URL.revokeObjectURL(url); }, 1000);
    showToast('л°ұм—… нҢҢмқјмқҙ м ҖмһҘлҗҳм—ҲмҠөлӢҲлӢӨ (' + orders.length + 'кұҙ)');
  } catch(e) { showToast('л°ұм—… мӢӨнҢЁ: '+e.message); }
}
async function restoreFromFile(input) {
  try {
    const file = input.files[0];
    if (!file) return;
    showToast('нҢҢмқј мқҪлҠ” мӨ‘...', 5000);
    const zip = await JSZip.loadAsync(file);
    const jsonFile = Object.values(zip.files).find(f=>f.name.endsWith('.json'));
    if (!jsonFile) { showToast('мң нҡЁн•ң л°ұм—… нҢҢмқјмқҙ м•„лӢҷлӢҲлӢӨ'); return; }
    const text = await jsonFile.async('text');
    const data = JSON.parse(text);
    const count = (data.orders||[]).length;
    const expDate = data.exportDate ? data.exportDate.slice(0,10) : 'м•Ң мҲҳ м—ҶмқҢ';
    showToast('ліөмӣҗ мӢңмһ‘: ' + expDate + ' л°ұм—… (' + count + 'кұҙ)', 3000);

    showToast('ліөмӣҗ мӨ‘... (0/' + count + ')', 30000);

    // 1) кё°мЎҙ orders мӮӯм ң
    await new Promise(function(res, rej) {
      var tx = db.transaction('orders','readwrite');
      tx.objectStore('orders').clear();
      tx.oncomplete = res; tx.onerror = rej;
    });

    // 2) orders л°°м№ҳ ліөкө¬ (500кұҙм”©)
    var allOrders = data.orders || [];
    var BATCH = 500;
    for (var i = 0; i < allOrders.length; i += BATCH) {
      var chunk = allOrders.slice(i, i + BATCH);
      await new Promise(function(res, rej) {
        var tx = db.transaction('orders','readwrite');
        var store = tx.objectStore('orders');
        for (var j = 0; j < chunk.length; j++) store.put(chunk[j]);
        tx.oncomplete = res; tx.onerror = function(e) { rej(e.target.error); };
      });
      showToast('ліөмӣҗ мӨ‘... (' + Math.min(i+BATCH,allOrders.length) + '/' + count + ')', 30000);
    }
    orders = allOrders;

    // 3) settings ліөкө¬
    if (data.settings) settings = Object.assign(settings, data.settings);

    // 4) platformList ліөкө¬ (v2.0 мқҙмғҒ)
    if (data.platformList && Array.isArray(data.platformList)) {
      platformList = data.platformList;
    }

    // 5) addrHistory ліөкө¬
    if (data.addrHistory && Array.isArray(data.addrHistory) && data.addrHistory.length > 0) {
      await new Promise(function(res, rej) {
        var tx = db.transaction('addrHistory','readwrite');
        tx.objectStore('addrHistory').clear();
        tx.oncomplete = res; tx.onerror = rej;
      });
      for (var h = 0; h < data.addrHistory.length; h++) {
        await dbPut('addrHistory', data.addrHistory[h]);
      }
      addrHistory = data.addrHistory;
    }

    // 6) theme ліөкө¬
    if (data.theme !== undefined) {
      localStorage.setItem('appTheme', data.theme);
      document.documentElement.setAttribute('data-theme', data.theme);
      updateThemeIcon(data.theme);
    }

    // 7) м ҖмһҘ л°Ҹ м Ғмҡ©
    await saveSettings();
    applyFontSize(settings.fontSize || 'md');
    rebuildPlatforms();
    showToast('ліөмӣҗ мҷ„лЈҢ! (' + count + 'кұҙ)', 3000);
    render();
  } catch(e) { showToast('ліөмӣҗ мӢӨнҢЁ: '+e.message); }
}
async function importLegacyDB(input) {
  try {
    const file = input.files[0];
    if (!file) return;
    let dbBuffer;
    if (file.name.endsWith('.zip')) {
      const zip = await JSZip.loadAsync(file);
      const dbFile = Object.values(zip.files).find(f=>f.name.endsWith('.db'));
      if (!dbFile) { showToast('.db нҢҢмқјмқ„ м°ҫмқ„ мҲҳ м—ҶмҠөлӢҲлӢӨ'); return; }
      dbBuffer = await dbFile.async('arraybuffer');
    } else {
      dbBuffer = await file.arrayBuffer();
    }
    showToast('DB нҢҢмқј к°җм§ҖлҗЁ вҖ” ліҖнҷҳ мӨ‘...', 3000);
    await loadSqlJs(dbBuffer);
  } catch(e) { showToast('к°Җм ёмҳӨкё° мӢӨнҢЁ: '+e.message); }
}
async function loadSqlJs(dbBuffer) {
  if (!window.initSqlJs) {
    await new Promise(function(res, rej) {
      const s = document.createElement('script');
      s.src = 'https://cdnjs.cloudflare.com/ajax/libs/sql.js/1.10.2/sql-wasm.js';
      s.onload = res; s.onerror = rej;
      document.head.appendChild(s);
    });
  }
  const SQL = await window.initSqlJs({ locateFile: function(f) { return 'https://cdnjs.cloudflare.com/ajax/libs/sql.js/1.10.2/'+f; } });
  const legacyDb = new SQL.Database(new Uint8Array(dbBuffer));
  const calls = legacyDb.exec("SELECT _id, CALL_WORK_DATE, CALL_APP, CALL_ORDER_DATETIME, CALL_START, CALL_END, CALL_VISIT, CALL_REMARK FROM T_CALL")[0];
  const cash = legacyDb.exec("SELECT CALL_ID, ITEM_ID, CASH_MONEY FROM T_CASH")[0];
  if (!calls) { showToast('мҪң лҚ°мқҙн„°к°Җ м—ҶмҠөлӢҲлӢӨ'); return; }
  const cashMap = {};
  if (cash) {
    for (const row of cash.values) {
      const callId=row[0], itemId=row[1], money=row[2];
      if (!cashMap[callId]) cashMap[callId] = {};
      cashMap[callId][itemId] = (cashMap[callId][itemId]||0) + (money||0);
    }
  }
  const platformMap = {'м№ҙм№ҙмҳӨ':'kakao','м№ҙм№ҙмҳӨл“ңлқјмқҙлІ„':'kakao','нӢ°л§ө':'tmap','нӢ°л§өл“ңлқјмқҙлІ„':'tmap','лҢҖкө¬мӢңлҜј':'daegu','мҲҳнҚјл“ңлқјмқҙлІ„':'super','лЎңм§Җ1':'logi1','лЎңм§Җ2':'logi2','м•„мқҙмҪҳ':'icon','м•„мқҙмҪҳмҪңл§Ҳл„Ҳ1':'icon','мҪңл§Ҳл„Ҳ1':'icon2','мҪңл§Ҳл„Ҳ':'icon2','кё°нғҖ':'unknown'};
  const converted = [];
  for (const row of calls.values) {
    const id=row[0], workDate=row[1], app=row[2], orderDt=row[3], start=row[4], end=row[5], visit=row[6], remark=row[7];
    const c = cashMap[id]||{};
    const fare=c[1]||0, extraRoute=c[2]||0, tip=c[3]||0;
    const feeRaw=Math.abs(c[4]||0), transRaw=Math.abs(c[5]||0);
    const pid = platformMap[app]||'unknown';
    const p = PLATFORMS[pid] || { feeRate: 0.2 };
    const computedFare = feeRaw>0 ? Math.round(feeRaw/p.feeRate) : fare;
    const dt = orderDt||workDate+' 00:00';
    converted.push({
      platform:pid, datetime:dt, date:dt.split(' ')[0],
      startAddr:start||'', endAddr:end||'',
      visitAddrs: visit ? [visit] : [],
      fare:computedFare, extraRoute, tip, feeOverride:null,
      isAffiliate:false, affiliateExempt:false, affiliateFee:0,
      tmapExtraFee:0, perCallInsurance:0, toll:0,
      transports: transRaw>0?[{type:'кё°нғҖ',amount:transRaw}]:[],
      remark: remark||'',
    });
  }
  showToast(converted.length + 'кұҙ ліҖнҷҳ мҷ„лЈҢ вҖ” м ҖмһҘ мӨ‘...', 3000);
  showToast('к°Җм ёмҳӨкё° мӨ‘... (0/' + converted.length + ')', 30000);
  var BATCH = 500;
  for (var i = 0; i < converted.length; i += BATCH) {
    var chunk = converted.slice(i, i + BATCH);
    await new Promise(function(res, rej) {
      var tx = db.transaction('orders','readwrite');
      var store = tx.objectStore('orders');
      chunk.forEach(function(o) {
        var req = store.put(o);
        req.onsuccess = function(e) { o.id = e.target.result; };
      });
      tx.oncomplete = res;
      tx.onerror = function(e) { rej(e.target.error); };
    });
    orders = orders.concat(chunk);
    var done = Math.min(i + BATCH, converted.length);
    showToast('к°Җм ёмҳӨкё° мӨ‘... (' + done + '/' + converted.length + ')', 30000);
  }
  showToast(converted.length + 'кұҙ к°Җм ёмҳӨкё° мҷ„лЈҢ!', 3000);
  render();
}

window.addEventListener('popstate', function(e) {

function applyFontSize(size) {
  // html лЈЁнҠё font-size (rem кё°л°ҳ мҡ”мҶҢмҡ©)
  const rootMap = { xs: '12px', sm: '14px', md: '16px', lg: '19px' };
  document.documentElement.style.fontSize = rootMap[size] || '14px';
  // data-fontsize мҶҚм„ұмңјлЎң CSS м„ нғқмһҗ нҠёлҰ¬кұ°
  document.documentElement.setAttribute('data-fontsize', size || 'sm');
}

// ===================== мҠӨмҷҖмқҙн”„ к°җм§Җ =====================
function bindSwipe(el, callback) {
  if (!el) return;
  var _sx = 0, _sy = 0;
  el.addEventListener('touchstart', function(e) {
    _sx = e.touches[0].clientX;
    _sy = e.touches[0].clientY;
  }, { passive: true });
  el.addEventListener('touchend', function(e) {
    var dx = e.changedTouches[0].clientX - _sx;
    var dy = e.changedTouches[0].clientY - _sy;
    // мҲҳнҸү мқҙлҸҷмқҙ 50px мқҙмғҒмқҙкі  мҲҳм§ҒліҙлӢӨ нҒҙ л•Ңл§Ң
    if (Math.abs(dx) > 50 && Math.abs(dx) > Math.abs(dy) * 1.5) {
      callback(dx < 0 ? 'left' : 'right');
    }
  }, { passive: true });
}

// ===================== кёҲм•Ў мһҗлҸҷм¶•мҶҢ =====================
function autoShrinkAmounts() {
  // мӣ”лӢ¬л Ҙ day-row м•Ҳмқҳ кёҲм•Ў н…ҚмҠӨнҠё
  document.querySelectorAll('.row-net, .row-income, .row-expense').forEach(function(el) {
    el.style.fontSize = '';
    var parent = el.closest('.dr-right') || el.parentElement;
    if (!parent) return;
    var maxW = parent.offsetWidth;
    if (maxW <= 0) return;
    var curSize = parseFloat(getComputedStyle(el).fontSize);
    var tries = 0;
    while (el.scrollWidth > maxW + 2 && curSize > 8 && tries < 10) {
      curSize -= 1;
      el.style.fontSize = curSize + 'px';
      tries++;
    }
  });
  // н•ҳлӢЁл°” кёҲм•Ў
  document.querySelectorAll('.parent-bar-val').forEach(function(el) {
    el.style.fontSize = '';
    var parent = el.closest('.parent-bar-item');
    if (!parent) return;
    var maxW = parent.offsetWidth - 8;
    if (maxW <= 0) return;
    var curSize = parseFloat(getComputedStyle(el).fontSize);
    var tries = 0;
    while (el.scrollWidth > maxW && curSize > 9 && tries < 10) {
      curSize -= 1;
      el.style.fontSize = curSize + 'px';
      tries++;
    }
  });
}

async function init() {
  initTheme();
  await initDB();
  await loadData();
  applyFontSize(settings.fontSize || 'sm');
  showView('main');
}
