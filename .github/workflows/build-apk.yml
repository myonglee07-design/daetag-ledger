name: Build APK

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout
      uses: actions/checkout@v4

- name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install npm dependencies
        run: npm ci

      - name: Capacitor sync
        run: npx cap sync android
    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        distribution: temurin
        java-version: 17

    - name: Decode keystore
      run: |
        echo "${{ secrets.KEYSTORE_BASE64 }}" | tr -d ' \n\r' | grep -v 'CERTIFICATE' | base64 -d > android/app/daetag-release.jks

    - name: Make gradlew executable
      run: chmod +x android/gradlew

    - name: Build Release APK
      run: |
        cd android
        ./gradlew assembleRelease -x lintVitalRelease

- name: Sign APK
        env:
          KS_PASS: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_PASS: ${{ secrets.KEY_PASSWORD }}
          KS_ALIAS: ${{ secrets.KEYSTORE_ALIAS }}
        run: |
          BUILD_TOOLS=$ANDROID_HOME/build-tools/$(ls $ANDROID_HOME/build-tools | tail -1)
          $BUILD_TOOLS/zipalign -f -v 4 \
            android/app/build/outputs/apk/release/app-release-unsigned.apk \
            daetag-signed.apk
          $BUILD_TOOLS/apksigner sign \
            --ks android/app/daetag-release.jks \
            --ks-pass "pass:$KS_PASS" \
            --ks-key-alias "$KS_ALIAS" \
            --key-pass "pass:$KEY_PASS" \
            --out daetag-release.apk \
            daetag-signed.apk

    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: daetag-release-apk
        path: daetag-release.apk
        retention-days: 7
